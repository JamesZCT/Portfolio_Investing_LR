name: Refresh Web Snapshot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Data mode for snapshot generation"
        default: "real"
        required: true
        type: choice
        options:
          - real
          - sandbox
      deploy_to_netlify:
        description: "Publish this run to Netlify production. Leave false for compute-only refreshes."
        default: false
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SNAPSHOT_MODE: ${{ inputs.mode || 'real' }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Prepare config
        run: |
          if [ -n "${{ secrets.PORTFOLIO_CONFIG_YAML }}" ]; then
            printf '%s' "${{ secrets.PORTFOLIO_CONFIG_YAML }}" > config.yaml
            echo "Using PORTFOLIO_CONFIG_YAML secret."
          else
            cp example_config.yaml config.yaml
            echo "Using example_config.yaml."
          fi

      - name: Export web snapshot
        run: |
          python scripts/export_web_snapshot.py --config config.yaml --out-dir web/public/data/us --mode "$SNAPSHOT_MODE" --lookback-days 900
          python scripts/export_web_snapshot.py --config example_hk_config.yaml --out-dir web/public/data/hk --mode "$SNAPSHOT_MODE" --lookback-days 900
          cp web/public/data/us/*.json web/public/data/

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Commit refreshed snapshot
        id: commit_snapshot
        run: |
          if git diff --quiet -- web/public/data; then
            echo "No snapshot changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          git commit -m "Refresh market data snapshot"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Netlify
        if: ${{ inputs.deploy_to_netlify == true && env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != '' }}
        run: npx netlify deploy --prod --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"

      - name: Report skipped Netlify deploy
        if: ${{ inputs.deploy_to_netlify != true || env.NETLIFY_AUTH_TOKEN == '' || env.NETLIFY_SITE_ID == '' }}
        run: |
          echo "Netlify deploy skipped."
          echo "changed=${{ steps.commit_snapshot.outputs.changed }}"
          echo "manual_deploy_requested=${{ inputs.deploy_to_netlify == true }}"
          echo "has_token=${{ env.NETLIFY_AUTH_TOKEN != '' }}"
          echo "has_site_id=${{ env.NETLIFY_SITE_ID != '' }}"
