name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Compile package
        run: python -m py_compile src/portfolio_agent/*.py

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run API sandbox smoke tests
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from portfolio_agent.api import app

          client = TestClient(app)
          paths = [
              "/api/health",
              "/api/dashboard?mode=sandbox&lookback_days=420",
              "/api/backtest?mode=sandbox&lookback_days=420",
              "/api/strategies/compare?mode=sandbox&lookback_days=420",
              "/api/rules",
              "/api/ohlc?mode=sandbox&ticker=SPY&lookback_days=120",
              "/api/news-sentiment?mode=sandbox&lookback_days=420",
          ]
          for path in paths:
              response = client.get(path)
              assert response.status_code == 200, f"{path}: {response.status_code} {response.text}"
          PY

      - name: Export sandbox web snapshot
        run: python scripts/export_web_snapshot.py --config example_config.yaml --mode sandbox --lookback-days 420

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build
