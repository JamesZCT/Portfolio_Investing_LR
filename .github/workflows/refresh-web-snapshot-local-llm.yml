name: Refresh Web Snapshot Local LLM

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Data mode for snapshot generation"
        default: "real"
        required: true
        type: choice
        options:
          - real
          - sandbox
      model:
        description: "Local LLM model name"
        default: "qwen3:8b"
        required: true
        type: string
      provider:
        description: "Local/private LLM provider"
        default: "ollama"
        required: true
        type: choice
        options:
          - ollama
          - openai_compatible
      deploy_to_netlify:
        description: "Publish this run to Netlify production. Leave false for compute-only refreshes."
        default: false
        required: true
        type: boolean
  schedule:
    # US pre-open sentiment refresh: 08:30 ET during daylight saving time.
    - cron: "30 12 * * 1-5"
    # US post-close data refresh: after regular close, with room for Yahoo/yfinance data availability.
    - cron: "30 22 * * 1-5"
    # Weekly production publish after Friday post-close refresh. Costs 15 Netlify credits when successful.
    - cron: "30 23 * * 5"

permissions:
  contents: write
  pages: write
  id-token: write

defaults:
  run:
    shell: powershell

jobs:
  refresh:
    runs-on: [self-hosted, windows, local-llm]
    env:
      SNAPSHOT_MODE: ${{ inputs.mode || 'real' }}
      LLM_SENTIMENT_PROVIDER: ${{ inputs.provider || 'ollama' }}
      LLM_SENTIMENT_MODEL: ${{ inputs.model || 'qwen3:8b' }}
      LLM_SENTIMENT_THINK: ${{ vars.LLM_SENTIMENT_THINK || 'false' }}
      OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'http://127.0.0.1:11434' }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'http://127.0.0.1:8000/v1' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEARCH_DIGEST_DIR: ${{ vars.RESEARCH_DIGEST_DIR || 'C:\portfolio-research-digest' }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python dependencies
        run: |
          if (-not (Test-Path .venv\Scripts\python.exe)) {
            python -m venv .venv
          }
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt
          .\.venv\Scripts\python.exe -m pip install -e .

      - name: Prepare config
        run: |
          Copy-Item example_config.yaml config.yaml
          echo "Using public demo example_config.yaml."

      - name: Start Ollama if installed
        run: |
          $command = Get-Command ollama -ErrorAction SilentlyContinue
          $ollama = if ($command) { $command.Source } else { Join-Path $env:LOCALAPPDATA 'Programs\Ollama\ollama.exe' }
          if (-not (Test-Path $ollama)) {
            Write-Host "Ollama executable not found. The workflow will fall back to heuristic sentiment."
            exit 0
          }
          try {
            Invoke-RestMethod -Uri "$env:OLLAMA_BASE_URL/api/tags" -TimeoutSec 5 | Out-Null
            Write-Host "Ollama is already reachable."
          } catch {
            Write-Host "Starting Ollama from $ollama"
            Start-Process -FilePath $ollama -ArgumentList "serve" -WindowStyle Hidden
            Start-Sleep -Seconds 8
          }

      - name: Check local LLM
        id: local_llm
        run: .\.venv\Scripts\python.exe scripts\check_local_llm.py --provider "$env:LLM_SENTIMENT_PROVIDER" --model "$env:LLM_SENTIMENT_MODEL" --soft

      - name: Export web snapshot
        env:
          LLM_SENTIMENT_ENABLED: ${{ steps.local_llm.outputs.available == 'true' && 'true' || 'false' }}
        run: |
          echo "LLM available: ${{ steps.local_llm.outputs.available }}"
          echo "LLM status: ${{ steps.local_llm.outputs.reason }}"
          .\.venv\Scripts\python.exe scripts\export_web_snapshot.py --config config.yaml --out-dir web\public\data\us --mode "$env:SNAPSHOT_MODE" --lookback-days 900
          .\.venv\Scripts\python.exe scripts\export_web_snapshot.py --config example_hk_config.yaml --out-dir web\public\data\hk --mode "$env:SNAPSHOT_MODE" --lookback-days 900
          Copy-Item web\public\data\us\*.json web\public\data\

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.x"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Commit refreshed snapshot
        id: commit_snapshot
        run: |
          git diff --quiet -- web/public/data
          if ($LASTEXITCODE -eq 0) {
            echo "No snapshot changes to commit."
            "changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          git commit -m "Refresh market data snapshot"
          git push
          "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Decide Netlify deploy
        id: deploy_policy
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          MANUAL_DEPLOY: ${{ inputs.deploy_to_netlify || false }}
        run: |
          $shouldDeploy = "false"
          $reason = "daily compute-only refresh"

          if ($env:EVENT_NAME -eq "workflow_dispatch" -and $env:MANUAL_DEPLOY -eq "true") {
            $shouldDeploy = "true"
            $reason = "manual production deploy requested"
          } elseif ($env:EVENT_NAME -eq "schedule" -and $env:EVENT_SCHEDULE -eq "30 23 * * 5") {
            $shouldDeploy = "true"
            $reason = "weekly Friday production publish"
          }

          "should_deploy=$shouldDeploy" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "Netlify deploy policy: $shouldDeploy ($reason)"

      - name: Deploy to Netlify
        if: ${{ steps.deploy_policy.outputs.should_deploy == 'true' && env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != '' }}
        run: npx netlify deploy --prod --site "$env:NETLIFY_SITE_ID" --auth "$env:NETLIFY_AUTH_TOKEN"

      - name: Report skipped Netlify deploy
        if: ${{ steps.deploy_policy.outputs.should_deploy != 'true' || env.NETLIFY_AUTH_TOKEN == '' || env.NETLIFY_SITE_ID == '' }}
        run: |
          echo "Netlify deploy skipped."
          echo "changed=${{ steps.commit_snapshot.outputs.changed }}"
          echo "policy=${{ steps.deploy_policy.outputs.reason }}"
          echo "has_token=${{ env.NETLIFY_AUTH_TOKEN != '' }}"
          echo "has_site_id=${{ env.NETLIFY_SITE_ID != '' }}"

  deploy_pages:
    runs-on: ubuntu-latest
    needs: refresh
    defaults:
      run:
        shell: bash
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.x"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build GitHub Pages artifact
        working-directory: web
        env:
          VITE_DATA_MODE: static
        run: |
          npm ci
          npm run build -- --base=/Portfolio_Investing_LR/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
