name: Refresh Web Snapshot Local LLM

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Data mode for snapshot generation"
        default: "real"
        required: true
        type: choice
        options:
          - real
          - sandbox
      model:
        description: "Local LLM model name"
        default: "qwen3:8b"
        required: true
        type: string
      provider:
        description: "Local/private LLM provider"
        default: "ollama"
        required: true
        type: choice
        options:
          - ollama
          - openai_compatible
  schedule:
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  refresh:
    runs-on: [self-hosted, windows, local-llm]
    env:
      SNAPSHOT_MODE: ${{ inputs.mode || 'real' }}
      LLM_SENTIMENT_PROVIDER: ${{ inputs.provider || 'ollama' }}
      LLM_SENTIMENT_MODEL: ${{ inputs.model || 'qwen3:8b' }}
      LLM_SENTIMENT_THINK: ${{ vars.LLM_SENTIMENT_THINK || 'false' }}
      OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'http://127.0.0.1:11434' }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'http://127.0.0.1:8000/v1' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Prepare config
        env:
          PORTFOLIO_CONFIG_YAML: ${{ secrets.PORTFOLIO_CONFIG_YAML }}
        run: |
          if [ -n "$PORTFOLIO_CONFIG_YAML" ]; then
            printf '%s' "$PORTFOLIO_CONFIG_YAML" > config.yaml
            echo "Using PORTFOLIO_CONFIG_YAML secret."
          else
            cp example_config.yaml config.yaml
            echo "Using example_config.yaml."
          fi

      - name: Start Ollama if installed
        shell: pwsh
        run: |
          $command = Get-Command ollama -ErrorAction SilentlyContinue
          $ollama = if ($command) { $command.Source } else { Join-Path $env:LOCALAPPDATA 'Programs\Ollama\ollama.exe' }
          if (-not (Test-Path $ollama)) {
            Write-Host "Ollama executable not found. The workflow will fall back to heuristic sentiment."
            exit 0
          }
          try {
            Invoke-RestMethod -Uri "$env:OLLAMA_BASE_URL/api/tags" -TimeoutSec 5 | Out-Null
            Write-Host "Ollama is already reachable."
          } catch {
            Write-Host "Starting Ollama from $ollama"
            Start-Process -FilePath $ollama -ArgumentList "serve" -WindowStyle Hidden
            Start-Sleep -Seconds 8
          }

      - name: Check local LLM
        id: local_llm
        run: python scripts/check_local_llm.py --provider "$LLM_SENTIMENT_PROVIDER" --model "$LLM_SENTIMENT_MODEL" --soft

      - name: Export web snapshot
        env:
          LLM_SENTIMENT_ENABLED: ${{ steps.local_llm.outputs.available == 'true' && 'true' || 'false' }}
        run: |
          echo "LLM available: ${{ steps.local_llm.outputs.available }}"
          echo "LLM status: ${{ steps.local_llm.outputs.reason }}"
          python scripts/export_web_snapshot.py --config config.yaml --out-dir web/public/data/us --mode "$SNAPSHOT_MODE" --lookback-days 900
          python scripts/export_web_snapshot.py --config example_hk_config.yaml --out-dir web/public/data/hk --mode "$SNAPSHOT_MODE" --lookback-days 900
          cp web/public/data/us/*.json web/public/data/

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.x"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Commit refreshed snapshot
        id: commit_snapshot
        run: |
          if git diff --quiet -- web/public/data; then
            echo "No snapshot changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          git commit -m "Refresh market data snapshot"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Netlify
        if: ${{ (steps.commit_snapshot.outputs.changed == 'true' || github.event_name == 'workflow_dispatch') && env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != '' }}
        run: npx netlify deploy --prod --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"

      - name: Report skipped Netlify deploy
        if: ${{ (steps.commit_snapshot.outputs.changed != 'true' && github.event_name != 'workflow_dispatch') || env.NETLIFY_AUTH_TOKEN == '' || env.NETLIFY_SITE_ID == '' }}
        run: |
          echo "Netlify deploy skipped."
          echo "changed=${{ steps.commit_snapshot.outputs.changed }}"
          echo "has_token=${{ env.NETLIFY_AUTH_TOKEN != '' }}"
          echo "has_site_id=${{ env.NETLIFY_SITE_ID != '' }}"
