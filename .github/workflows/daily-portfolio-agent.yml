name: Daily Portfolio Agent

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Compile package
        run: |
          python -m py_compile src/portfolio_agent/*.py

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests

      - name: Run API smoke tests
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from portfolio_agent.api import app

          client = TestClient(app)
          paths = [
              "/api/health",
              "/api/dashboard?mode=sandbox&lookback_days=420",
              "/api/backtest?mode=sandbox&lookback_days=420",
              "/api/strategies/compare?mode=sandbox&lookback_days=420",
              "/api/rules",
              "/api/ohlc?mode=sandbox&ticker=SPY&lookback_days=120",
          ]
          for path in paths:
              response = client.get(path)
              assert response.status_code == 200, f"{path}: {response.status_code} {response.text}"
          PY

      - name: Run sandbox smoke test
        run: |
          portfolio-agent sandbox --config example_config.yaml --out outputs/sandbox-smoke --days 420

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

  daily-run:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Prepare config
        run: |
          cp example_config.yaml config.yaml
          echo "Using public demo example_config.yaml."

      - name: Run daily agent
        run: |
          portfolio-agent daily --config config.yaml --out outputs

      - name: Run backtest snapshot
        run: |
          portfolio-agent backtest --config config.yaml --out outputs --lookback-days 900

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: portfolio-agent-outputs
          path: outputs
