name: Daily Portfolio Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Compile package
        run: |
          python -m py_compile src/portfolio_agent/*.py

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests

      - name: Run sandbox smoke test
        run: |
          portfolio-agent sandbox --config example_config.yaml --out outputs/sandbox-smoke --days 420

  daily-run:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Prepare config
        run: |
          if [ -n "${{ secrets.PORTFOLIO_CONFIG_YAML }}" ]; then
            printf '%s' "${{ secrets.PORTFOLIO_CONFIG_YAML }}" > config.yaml
          elif [ -f config.yaml ]; then
            echo "Using repository config.yaml"
          else
            cp example_config.yaml config.yaml
          fi

      - name: Run daily agent
        run: |
          portfolio-agent daily --config config.yaml --out outputs

      - name: Run backtest snapshot
        run: |
          portfolio-agent backtest --config config.yaml --out outputs --lookback-days 900

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-agent-outputs
          path: outputs
