services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORTFOLIO_AGENT_CORS_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173"
    ports:
      - "8000:8000"

  web:
    image: node:20-slim
    working_dir: /app/web
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: "http://127.0.0.1:8000"
      VITE_DATA_MODE: "api"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    depends_on:
      - api
